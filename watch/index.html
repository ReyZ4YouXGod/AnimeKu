<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Animeku Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

.player{
width:100%;
height:70vh;
background:black;
}

iframe{
width:100%;
height:100%;
}

.info{
padding:20px;
}

.info h1{
font-size:28px;
margin-bottom:15px;
}

button{
padding:12px 20px;
border:none;
background:#ff0033;
color:white;
border-radius:10px;
cursor:pointer;
}

.section{
padding:20px;
}

.section-title{
font-size:24px;
margin-bottom:20px;
}

.episode-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:#141414;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:13px;
}

@media(max-width:768px){

.player{
height:250px;
}

.info h1{
font-size:20px;
}

}

</style>
</head>
<body>

<div class="player">

<iframe
id="video-frame"
frameborder="0"
allowfullscreen
allow="autoplay">
</iframe>

</div>

<div class="info">

<h1 id="anime-title">
Loading...
</h1>

<button onclick="history.back()">
⬅ Kembali
</button>

</div>

<section class="section">

<h2 class="section-title">
Episode List
</h2>

<div class="episode-grid"
id="episode-list">
</div>

</section>

<script>

const API_KEY =
"MASUKKAN_API_KEY";

const id =
localStorage.getItem(
"animeId"
);

const title =
localStorage.getItem(
"animeTitle"
);

document.getElementById(
"anime-title"
).innerText = title;

document.getElementById(
"video-frame"
).src =
`https://www.youtube.com/embed/${id}?autoplay=1`;

/* LOAD EPISODE */

async function loadEpisodes(){

const url =
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${title}&key=${API_KEY}`;

try{

const res =
await fetch(url);

const data =
await res.json();

const episodeList =
document.getElementById(
"episode-list"
);

episodeList.innerHTML = "";

data.items.forEach(video => {

episodeList.innerHTML += `

<div class="card"
onclick="
changeEpisode(
'${video.id.videoId}',
\`${video.snippet.title}\`
)
">

<img src="${video.snippet.thumbnails.high.url}">

<h3>
${video.snippet.title}
</h3>

</div>

`;

});

}catch(err){

console.log(err);

}

}

/* CHANGE EPISODE */

function changeEpisode(id,title){

document.getElementById(
"video-frame"
).src =
`https://www.youtube.com/embed/${id}?autoplay=1`;

document.getElementById(
"anime-title"
).innerText = title;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

loadEpisodes();

</script>

</body>
</html>
