<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animeku</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

/* NAVBAR */

nav{
padding:15px 20px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #1f1f1f;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff0033;
}

.search-box{
width:250px;
}

.search-box input{
width:100%;
padding:10px 15px;
border:none;
outline:none;
border-radius:30px;
background:#1c1c1c;
color:white;
font-size:14px;
}

/* HERO */

.hero{
height:400px;
background:url('https://wallpapercave.com/wp/wp9427087.jpg') center/cover;
display:flex;
align-items:end;
padding:30px;
position:relative;
}

.hero::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0b0b,transparent);
}

.hero-content{
position:relative;
z-index:2;
max-width:600px;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
line-height:1.6;
color:#ddd;
}

/* SECTION */

.section{
padding:20px;
}

.section-title{
font-size:25px;
margin-bottom:20px;
}

/* GRID */

.anime-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

/* CARD */

.card{
background:#141414;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
border:1px solid transparent;
}

.card:hover{
transform:translateY(-5px);
border-color:#2c2c2c;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
display:block;
}

.card-content{
padding:12px;
}

.card-content h3{
font-size:14px;
margin-bottom:5px;
line-height:1.5;

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.card-content p{
font-size:12px;
color:#aaa;
}

/* FOOTER */

footer{
padding:20px;
text-align:center;
color:#777;
border-top:1px solid #1a1a1a;
margin-top:20px;
}

/* MOBILE */

@media(max-width:768px){

.hero{
height:300px;
padding:20px;
}

.hero h1{
font-size:30px;
}

.search-box{
width:150px;
}

.anime-grid{
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card img{
height:220px;
}

}

</style>
</head>
<body>

<nav>

<div class="logo">
Animeku
</div>

<div class="search-box">
<input type="text"
id="search"
placeholder="Cari anime...">
</div>

</nav>

<section class="hero">

<div class="hero-content">

<h1>Infomation</h1>

<p>
Mohon Maaf Atas Tidak Kenyamannya dan tidak sesuai sama title website ini
Jika Ada Kendala Bisa hub reyclouddev@gmail.com / 6281260512743
</p>

</div>

</section>

<section class="section">

<h2 class="section-title">
Trending Anime
</h2>

<div class="anime-grid"
id="anime-list">
</div>

</section>

<footer>
Animeku © 2026
</footer>

<script>

const API_KEY = "AIzaSyBimCFF1hn24oOov7dCz6b9uzepGka_5lU";

const container =
document.getElementById("anime-list");

const search =
document.getElementById("search");

let allVideos = [];

/* LOAD */

async function loadAnime(
query = "anime muse indonesia"
){

container.innerHTML =
"<h2 style='padding:20px'>Loading...</h2>";

const url =
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=30&q=${encodeURIComponent(query)}&key=${API_KEY}`;

try{

const res = await fetch(url);

const data = await res.json();

allVideos = data.items || [];

renderAnime(allVideos);

}catch(err){

container.innerHTML =
"<h2 style='padding:20px'>Gagal load anime</h2>";

console.log(err);

}

}

/* RENDER */

function renderAnime(videos){

container.innerHTML = "";

videos.forEach(video => {

container.innerHTML += `

<div class="card"
onclick="goWatch(
'${video.id.videoId}',
\`${video.snippet.title.replace(/`/g,"")}\`
)">

<img src="${video.snippet.thumbnails.high.url}">

<div class="card-content">

<h3>
${video.snippet.title}
</h3>

<p>
${video.snippet.channelTitle}
</p>

</div>

</div>

`;

});

}

/* GO WATCH */

function goWatch(id,title){

localStorage.setItem(
"animeId",
id
);

localStorage.setItem(
"animeTitle",
title
);

window.location.href =
"watch";

}

/* SEARCH */

let timeout;

search.addEventListener("keyup", () => {

clearTimeout(timeout);

timeout = setTimeout(() => {

const keyword =
search.value.trim();

if(keyword.length > 2){

loadAnime(
keyword + " muse indonesia"
);

}else{

loadAnime();

}

},400);

});

loadAnime();

</script>

</body>
</html>
